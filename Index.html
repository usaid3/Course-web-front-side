<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Free Host - College Project</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; padding: 50px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .upload-box { border: 2px dashed #3b82f6; padding: 40px; border-radius: 8px; cursor: pointer; background: #1e293b; transition: 0.3s; }
        .upload-box:hover { background: #334155; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button:hover { background: #1d4ed8; }
        #loading { display: none; margin-top: 20px; font-style: italic; color: #60a5fa; }
        #result { display: none; margin-top: 20px; background: #0f172a; padding: 20px; border-radius: 8px; border: 1px solid #334155; }
        a { color: #4ade80; font-weight: bold; text-decoration: none; word-break: break-all; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Instant Free Project Hosting</h2>
    <p>No Signup, No Fees. Just upload your project ZIP and get a live link instantly!</p>
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
        <p>📂 Click here or Drag & Drop your Project ZIP file</p>
        <input type="file" id="fileInput" accept=".zip" style="display:none;" onchange="showSelectedName()">
        <div id="fileName" style="color: #4ade80; font-weight: bold; margin-top: 10px;"></div>
    </div>

    <button onclick="startFakeDeployment()">Deploy Project</button>

    <div id="loading">🚀 Deploying project... Please wait...</div>

    <div id="result">
        <p style="color: #4ade80; font-size: 18px; margin: 0 0 10px 0;">🎉 Project Deployed Successfully!</p>
        <p>Your Live Dummy Domain:</p>
        <a id="dummyLink" href="#" target="_blank"></a>
    </div>
</div>

<script>
    function showSelectedName() {
        const fileInput = document.getElementById('fileInput');
        const fileNameDiv = document.getElementById('fileName');
        if(fileInput.files.length > 0) {
            fileNameDiv.innerText = "Selected File: " + fileInput.files[0].name;
        }
    }

    function startFakeDeployment() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) {
            alert("Please select a ZIP file first!");
            return;
        }

        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const dummyLink = document.getElementById('dummyLink');

        result.style.display = "none";
        loading.style.display = "block";

        setTimeout(() => {
            loading.style.display = "none";
            result.style.display = "block";
            
            const randomID = Math.floor(100000 + Math.random() * 900000);
            const dummyURL = `https://user-project-${randomID}.freehost.com`;
            
            dummyLink.innerText = dummyURL;
            dummyLink.href = dummyURL;
            
            dummyLink.onclick = function(e) {
                e.preventDefault();
                alert(`🎯 Project Simulated Link:\n${dummyURL}\n\nThis simulation demonstrates automated serverless instant delivery logic for college evaluation.`);
            };
        }, 3000);
    }
</script>

</body>
</html>
